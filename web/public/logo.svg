<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1b5e"/>
      <stop offset="100%" stop-color="#0f0e17"/>
    </radialGradient>
    <linearGradient id="topCap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4a7ff"/>
      <stop offset="50%" stop-color="#9b72ff"/>
      <stop offset="100%" stop-color="#6b3fd9"/>
    </linearGradient>
    <linearGradient id="botCap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b5eef"/>
      <stop offset="50%" stop-color="#6b4ecf"/>
      <stop offset="100%" stop-color="#3b1e89"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Outer ring glow -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#836EF9" stroke-width="2" opacity="0.35"/>
  <circle cx="256" cy="256" r="215" fill="none" stroke="#836EF9" stroke-width="1" opacity="0.15"/>

  <!-- Ambient purple glow -->
  <circle cx="256" cy="256" r="180" fill="#836EF9" opacity="0.07"/>

  <!-- Top capsule half — flying upper-left, tilted -->
  <g transform="translate(256,256) rotate(-18) translate(-256,-256)">
    <g transform="translate(140,130)">
      <!-- Shadow -->
      <ellipse cx="60" cy="6" rx="68" ry="28" fill="#000" opacity="0.3"/>
      <!-- Body -->
      <ellipse cx="60" cy="0" rx="68" ry="28" fill="url(#topCap)"/>
      <!-- Top highlight sheen -->
      <ellipse cx="45" cy="-10" rx="40" ry="12" fill="white" opacity="0.22"/>
      <!-- Bottom ridge -->
      <ellipse cx="60" cy="20" rx="60" ry="8" fill="#5B32B9" opacity="0.5"/>
      <!-- POP text -->
      <text x="60" y="8" text-anchor="middle" fill="white"
        font-size="22" font-weight="900" font-family="Arial Black,sans-serif"
        stroke="#3a1a80" stroke-width="3" paint-order="stroke">POP</text>
    </g>
  </g>

  <!-- Bottom capsule half — flying lower-right, tilted -->
  <g transform="translate(256,256) rotate(-18) translate(-256,-256)">
    <g transform="translate(305,325)">
      <!-- Shadow -->
      <ellipse cx="60" cy="6" rx="68" ry="28" fill="#000" opacity="0.3"/>
      <!-- Body -->
      <ellipse cx="60" cy="0" rx="68" ry="28" fill="url(#botCap)"/>
      <!-- Top highlight sheen -->
      <ellipse cx="48" cy="-8" rx="35" ry="10" fill="white" opacity="0.15"/>
      <!-- MON text -->
      <text x="60" y="7" text-anchor="middle" fill="white"
        font-size="17" font-weight="900" font-family="Arial Black,sans-serif"
        stroke="#2a0e70" stroke-width="2" paint-order="stroke">MON</text>
    </g>
  </g>

  <!-- MON! central text — orange/gold glow -->
  <text x="256" y="295" text-anchor="middle"
    fill="#F59E0B"
    font-size="96" font-weight="900" font-family="Arial Black,sans-serif"
    stroke="#000" stroke-width="8" paint-order="stroke"
    filter="url(#glow)">MON!</text>

  <!-- Gold sparkle — top left -->
  <g transform="translate(88,108)" filter="url(#softGlow)">
    <line x1="0" y1="-14" x2="0" y2="14" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    <line x1="-9" y1="-9" x2="9" y2="9" stroke="#FFD700" stroke-width="1.8" opacity="0.65"/>
    <line x1="9" y1="-9" x2="-9" y2="9" stroke="#FFD700" stroke-width="1.8" opacity="0.65"/>
  </g>

  <!-- Purple sparkle — top right -->
  <g transform="translate(408,88)">
    <line x1="0" y1="-11" x2="0" y2="11" stroke="#C4A7FF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-11" y1="0" x2="11" y2="0" stroke="#C4A7FF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#C4A7FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="#C4A7FF" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Small sparkle — lower left -->
  <g transform="translate(95,378)">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#FFD700" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#FFD700" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- Small sparkle — lower right -->
  <g transform="translate(432,410)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#C4A7FF" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#C4A7FF" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Particle dots -->
  <circle cx="132" cy="215" r="5" fill="#9B72FF" opacity="0.85"/>
  <circle cx="383" cy="175" r="4" fill="#FFD700" opacity="0.75"/>
  <circle cx="340" cy="440" r="6" fill="#836EF9" opacity="0.65"/>
  <circle cx="172" cy="445" r="4" fill="#FFD700" opacity="0.55"/>
  <circle cx="450" cy="270" r="5" fill="#C4A7FF" opacity="0.75"/>
  <circle cx="68" cy="268" r="4" fill="#C4A7FF" opacity="0.65"/>
  <circle cx="205" cy="95" r="3" fill="#FFD700" opacity="0.6"/>
  <circle cx="320" cy="105" r="3" fill="#9B72FF" opacity="0.6"/>

  <!-- Energy rays -->
  <g stroke="#836EF9" stroke-width="2" opacity="0.4" stroke-linecap="round">
    <line x1="256" y1="30" x2="256" y2="8"/>
    <line x1="404" y1="96" x2="422" y2="74"/>
    <line x1="464" y1="256" x2="494" y2="256"/>
    <line x1="108" y1="96" x2="90" y2="74"/>
    <line x1="48" y1="256" x2="18" y2="256"/>
    <line x1="404" y1="418" x2="422" y2="440"/>
    <line x1="108" y1="418" x2="90" y2="440"/>
    <line x1="256" y1="486" x2="256" y2="508"/>
  </g>
</svg>
